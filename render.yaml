# Render Blueprint — Dashboard → New → Blueprint → connect GitHub repo
# Set OPENAI_API_KEY on the API service after Apply (see DEPLOYMENT.md).
# Default URLs assume these service names; update env vars if Render assigns different URLs.

services:
  - type: web
    name: meteorite-explorer-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python -m app.scripts.ingest_meteorites
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://meteorite-explorer.onrender.com
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: meteorite-explorer
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://meteorite-explorer-api.onrender.com
