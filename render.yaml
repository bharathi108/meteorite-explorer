# Render Blueprint — deploy from Dashboard → New → Blueprint
# After deploy, add OPENAI_API_KEY in the service Environment tab.
# After Vercel deploy, set CORS_ORIGINS to your frontend URL.

services:
  - type: web
    name: meteorite-explorer-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python -m app.scripts.ingest_meteorites
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
